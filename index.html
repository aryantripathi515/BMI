<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bmi-Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<video id="backgroud-vd" src="backgroud.mp4" autoplay muted loop></video>
    <div id="Container">
        <h1>BMI Calculator</h1>
        <form >
            <p><label>Height In Cm:</label><input type="text" placeholder="Enter Height in cm" id="height"></p>
            <p><label >Weight In Kg:</label><input type="text" placeholder="Enter Weight in Kg" id="Weight"></p>
            <button >Calculate</button>
            <div id="result"></div>
            <div id="Weight-guide">
                <h3>BMI Weight Guide</h3>
                <p>Under Weight = less then 18.6</p>
                <p>Normal Range = 18.6 to 24.9</p>
                <p>OverWeight = Greater than 24.9</p>
            </div>
        </form>
    </div>
</body>
<script src="script.js"></script>
</html>
